<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ポケット獣急外来（試作）</title>
<style>
  :root{ --bg:#0e1116; --panel:#161b22; --line:#263041; --ink:#e6edf3; --sub:#9fb0c3;
    --accent:#3fb6ff; --green:#36d399; --red:#ff5d6c; --amber:#ffcf5c; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#05070a;color:var(--ink);overscroll-behavior:none;
    -webkit-text-size-adjust:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Noto Sans JP",sans-serif;}
  .phone{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;background:var(--bg);display:flex;flex-direction:column;position:relative;overflow:hidden}
  @media(min-width:481px){ body{padding:0} .phone{box-shadow:0 0 0 1px #1b232e} }
  .pill{display:inline-block;background:#13283c;color:var(--accent);border:1px solid #1f4361;border-radius:999px;padding:4px 12px;font-size:12px;font-weight:600}
  h1{font-size:22px;margin:10px 0 4px}
  p{line-height:1.55}
  .pad{padding:16px}
  .btn{appearance:none;border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:12px;padding:11px 14px;font-size:14px;font-weight:600;cursor:pointer;width:100%}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:linear-gradient(180deg,#1f6fb0,#155488);border-color:#1f6fb0}
  .btn.ghost{background:transparent}
  .sub{color:var(--sub);font-size:13px}.tiny{font-size:11px;color:var(--sub)}.hide{display:none}

  /* ---------- monitor ---------- */
  .monitor{background:#04130d;border-bottom:1px solid #10341f;padding:6px 8px}
  .topbar{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#7ef0c4;font-family:ui-monospace,Menlo,monospace}
  .monrow{display:flex;gap:6px;margin-top:4px}
  .ecgwrap{flex:1;background:#03100a;border:1px solid #10341f;border-radius:8px}
  canvas{display:block;width:100%;height:132px}
  .nums{width:96px;display:flex;flex-direction:column;justify-content:space-between}
  .num{line-height:1}
  .num .l{font-size:9px;color:#5fae8a}
  .num .v{font-size:26px;font-weight:800;font-family:ui-monospace,monospace}
  .num .v small{font-size:13px}
  .nHR .v{color:#37e08a}.nBP .v{color:#ff6d7a}.nSpO2 .v{color:#5fd0ff}.nRR .v{color:#ffd45c}

  /* ---------- room ---------- */
  .stage{flex:1;position:relative;overflow:hidden;background:linear-gradient(#0c1622,#0a1119)}
  .ccchip{position:absolute;top:10px;left:10px;z-index:3;background:#0f2233;border:1px solid #1f4361;color:#cfe6ff;border-radius:999px;padding:4px 12px;font-size:12px;font-weight:600;max-width:80%}
  svg.room{width:100%;height:100%;display:block}
  .station{cursor:pointer}
  .station .hit{fill:transparent}
  .station:active .lab{opacity:.6}
  .lab{font-size:12px;font-weight:700;fill:#dce8f5}
  .badge{font-size:11px;font-weight:800;fill:#37e08a}
  .statusbar{position:absolute;left:0;right:0;bottom:0;z-index:3;background:rgba(8,14,20,.86);border-top:1px solid var(--line);
    display:flex;gap:10px;flex-wrap:wrap;padding:7px 10px;font-size:12px;color:#cfe0f0}
  .statusbar b{color:#fff}

  /* ---------- sheets ---------- */
  .ov{position:fixed;inset:0;max-width:480px;margin:0 auto;background:rgba(2,5,9,.72);display:none;align-items:flex-end;z-index:80}
  .ov.show{display:flex}
  .sheet{background:var(--bg);border-top-left-radius:18px;border-top-right-radius:18px;border:1px solid var(--line);width:100%;max-height:90%;overflow:auto;padding:14px}
  .sheet h3{margin:2px 0 8px;display:flex;justify-content:space-between;align-items:center}
  .x{background:#1c2533;border:1px solid var(--line);color:#cfe0f0;border-radius:999px;width:30px;height:30px;font-size:16px;cursor:pointer}
  input[type=text]{width:100%;background:#0c1219;border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:10px;font-size:14px}
  details.grp{border:1px solid var(--line);border-radius:12px;margin-bottom:8px;background:#10151c;overflow:hidden}
  details.grp>summary{list-style:none;cursor:pointer;padding:10px 12px;font-weight:700;font-size:13.5px;display:flex;justify-content:space-between;align-items:center}
  details.grp>summary::-webkit-details-marker{display:none}
  .chips{display:flex;flex-wrap:wrap;gap:6px;padding:8px 10px 12px}
  .chip{background:#0c1219;border:1px solid var(--line);color:var(--ink);border-radius:999px;padding:7px 11px;font-size:13px;cursor:pointer}
  .chip.done{background:#0f2e22;border-color:#1d6b50;color:#8af0c6}
  .item{display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:#0c1219;border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:9px 11px;margin-bottom:6px;font-size:13.5px;cursor:pointer}
  .item .tick{width:16px;flex:0 0 16px;color:var(--sub);font-weight:800}.item.sel{border-color:#2c5a78}
  .tabs{display:flex;gap:6px;margin-bottom:10px}
  .tab{flex:1;text-align:center;padding:9px;border-radius:10px;border:1px solid var(--line);background:#0c1219;font-weight:700;font-size:13.5px;cursor:pointer}
  .tab.on{background:linear-gradient(180deg,#1f6fb0,#155488);border-color:#1f6fb0}
  .chat{background:#0a1019;border:1px solid var(--line);border-radius:12px;padding:10px;min-height:90px;max-height:230px;overflow:auto;margin-bottom:8px}
  .bub{max-width:84%;padding:7px 11px;border-radius:12px;margin:5px 0;font-size:13px;line-height:1.45}
  .bub.q{background:#1f6fb0;color:#fff;margin-left:auto;border-bottom-right-radius:3px}
  .bub.a{background:#192231;color:#e6edf3;border-bottom-left-radius:3px}
  .askrow{display:flex;gap:6px}.askrow input{flex:1}
  .askrow .send{width:64px;background:linear-gradient(180deg,#1f6fb0,#155488);border:1px solid #1f6fb0;color:#fff;border-radius:10px;font-weight:700;cursor:pointer}
  .log .e{font-size:13px;padding:7px 0;border-bottom:1px dashed #1c2533}.log .e:last-child{border-bottom:0}
  .log .ts{color:#5b6b7d;font-family:ui-monospace,monospace;font-size:11px;margin-right:6px}.warnmsg{color:var(--amber)}
  .bottombar{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px;padding-bottom:calc(8px + env(safe-area-inset-bottom));border-top:1px solid var(--line);background:#0f141b;flex:0 0 auto}
  .monitor{flex:0 0 auto}
  #cpr{position:fixed;inset:0;max-width:480px;margin:0 auto;background:var(--bg);z-index:55}
  #cpr.hide{display:none}
  .bottombar .btn{padding:10px 6px;font-size:13px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px}
  .scoreBig{font-size:42px;font-weight:900}
  .rchip{display:inline-block;border-radius:999px;padding:2px 8px;font-size:11px;margin-right:4px}
  .rchip.ok{background:#12372b;border:1px solid #1d6b50;color:#7ef0c4}.rchip.bad{background:#3a1820;border:1px solid #6b2330;color:#ff9aa6}
  .rchip.warn{background:#3a2f12;border:1px solid #6b561d;color:#ffd97a}.rchip.neu{background:#1c2533;border:1px solid #2a3647;color:#9fb0c3}
  .vsnap{font-family:ui-monospace,monospace;font-size:10px;color:#7d8ea0}
</style>
</head>
<body>
<div class="phone">

  <!-- START -->
  <div id="start" class="pad">
    <div style="text-align:center">
      <div class="pill">🐾 ポケット獣急外来（試作）</div>
      <h1>救急へようこそ、先生。</h1>
      <p class="sub">初療室の物をタップして、必要な問診・検査・処置を選ぶ臨床推論シミュレーター。メニューは全症例共通。良し悪しは最終評価で初めて分かります。</p>
    </div>
    <div id="caseList"></div>
    <button class="btn" style="margin-top:4px;border-color:#6b2330;color:#ff9aa6" onclick="openCPRPractice()">🫀 CPR/ALS 練習モード（CPAから直接開始）</button>
    <p class="tiny" style="margin-top:12px">※教育用。用量・手技・実診療判断は最新の成書／添付文書／施設プロトコル（RECOVER等）で確認してください。投与量計算は扱いません。</p>
  </div>

  <!-- SIM -->
  <div id="sim" class="hide" style="display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden">
    <div class="monitor">
      <div class="topbar"><span>🏥 初療室　<span id="clock">00:00</span></span><span id="alarm"></span></div>
      <div class="monrow">
        <div class="ecgwrap"><canvas id="mon" width="600" height="264"></canvas></div>
        <div class="nums">
          <div class="num nHR"><div class="l">HR /min</div><div class="v" id="nHR">–</div></div>
          <div class="num nBP"><div class="l">SAP/DAP mmHg</div><div class="v" id="nBP">–</div></div>
          <div class="num nSpO2"><div class="l">SpO₂ %</div><div class="v" id="nSpO2">–</div></div>
          <div class="num nRR"><div class="l">RR /min</div><div class="v" id="nRR">–</div></div>
        </div>
      </div>
    </div>

    <div class="stage">
      <div class="ccchip" id="ccchip"></div>
      <div class="ccchip" id="visualbar" style="top:auto;left:10px;right:10px;bottom:50px;background:rgba(26,20,16,.86);border-color:#5a4a2c;color:#ffd9a0;max-width:none"></div>
      <svg class="room" id="room" viewBox="0 0 400 320" preserveAspectRatio="xMidYMid meet"></svg>
      <div class="statusbar" id="statusbar"></div>
    </div>

    <div class="bottombar">
      <button class="btn" onclick="openLog()">📋 経過</button>
      <button class="btn" onclick="openDx()">🧠 診断</button>
      <button class="btn" onclick="openDispo()">🏷 方針</button>
      <button class="btn primary" onclick="openFinal()">⏹ 決定</button>
    </div>
  </div>

  <div id="result" class="hide pad"></div>
  <div id="cpr" class="hide"></div>
  <div class="ov" id="ov"><div class="sheet" id="sheet"></div></div>
</div>

<script>
"use strict";
/* =========================================================================
   ポケット獣急外来（試作 v4）— アイソメトリック初療室UI
   - エンジン（v3：共通カタログ＋症例ルール、隠し情報ゲート、前提/禁忌、中立表示）を踏襲
   - UI：初療室ナビ／3波形モニター／構造化問診・診察／時刻＋バイタル付き評価
   ========================================================================= */

// ---------- カタログ（操作系：安定化/薬剤/検査/処置） ----------
const CATALOG = [
  { key:"stab", cat:"🫁 安定化", search:false, items:[
    {id:"monitor",label:"モニター装着"},{id:"o2",label:"酸素投与"},{id:"ivc",label:"静脈路確保"},
    {id:"io",label:"骨髄路確保"},{id:"fluids",label:"維持輸液"},{id:"bolus",label:"晶質液ボーラス（少量）"},
    {id:"bigbolus",label:"大量急速輸液"},{id:"warm",label:"保温"},{id:"cool",label:"冷却"},{id:"cpcr",label:"CPCR（心肺蘇生）"},
  ]},
  { key:"drug", cat:"💊 薬剤棚", search:true, groups:[
    {g:"鎮痛薬", items:[{id:"d_buprenor",label:"ブプレノルフィン"},{id:"d_butorph",label:"ブトルファノール"},{id:"d_methadone",label:"メサドン"},{id:"d_fentanyl",label:"フェンタニル"},{id:"d_meloxicam",label:"メロキシカム（NSAID）"},{id:"d_robena",label:"ロベナコキシブ（NSAID）"}]},
    {g:"鎮静薬", items:[{id:"d_midazolam",label:"ミダゾラム"},{id:"d_propofol",label:"プロポフォール"},{id:"d_dexmed",label:"デクスメデトミジン"},{id:"d_medet",label:"メデトミジン"},{id:"d_acepro",label:"アセプロマジン"}]},
    {g:"抗痙攣薬", items:[{id:"d_levetira",label:"レベチラセタム"},{id:"d_phenobarb",label:"フェノバルビタール"}]},
    {g:"電解質・代謝", items:[{id:"d_calcium",label:"グルコン酸カルシウム"},{id:"d_dextrose",label:"ブドウ糖（静注）"},{id:"d_insulin",label:"速効型インスリン"},{id:"d_dexins",label:"ブドウ糖＋速効型インスリン"},{id:"d_bicarb",label:"重炭酸ナトリウム"},{id:"d_kcl",label:"塩化カリウム"}]},
    {g:"昇圧・循環作動薬", items:[{id:"d_adrenalin",label:"アドレナリン"},{id:"d_norad",label:"ノルアドレナリン"},{id:"d_dobu",label:"ドブタミン"},{id:"d_atropine",label:"アトロピン"}]},
    {g:"抗不整脈薬", items:[{id:"d_lidocaine",label:"リドカイン"},{id:"d_amiodaron",label:"アミオダロン"}]},
    {g:"利尿薬・浸透圧薬", items:[{id:"d_furosem",label:"フロセミド"},{id:"d_mannitol",label:"マンニトール"}]},
    {g:"抗菌薬", items:[{id:"d_ampi",label:"アンピシリン"},{id:"d_cefazolin",label:"セファゾリン"},{id:"d_enroflox",label:"エンロフロキサシン"},{id:"d_metronid",label:"メトロニダゾール"}]},
    {g:"抗炎症・免疫抑制・ステロイド", items:[{id:"d_predniso",label:"プレドニゾロン"},{id:"d_dexameth",label:"デキサメタゾン"},{id:"d_hydrocort",label:"ヒドロコルチゾン"},{id:"d_docp",label:"DOCP（デソキシコルチコステロン）"}]},
    {g:"消化器薬", items:[{id:"d_maropit",label:"マロピタント"},{id:"d_metoclo",label:"メトクロプラミド"},{id:"d_famotid",label:"ファモチジン"}]},
    {g:"呼吸器薬", items:[{id:"d_terbutal",label:"テルブタリン"},{id:"d_aminophy",label:"アミノフィリン"}]},
    {g:"抗血栓薬", items:[{id:"d_aspirin",label:"アスピリン"},{id:"d_clopidog",label:"クロピドグレル"},{id:"d_heparin",label:"ヘパリン"}]},
    {g:"拮抗薬・その他", items:[{id:"d_naloxone",label:"ナロキソン"},{id:"d_atipam",label:"アチパメゾール"}]},
  ]},
  { key:"lab", cat:"🖥 オーダーPC（検査）", search:true, groups:[
    {g:"血液検査", items:[{id:"l_cbc",label:"CBC（血球計数）"},{id:"l_smear",label:"血液塗抹"},{id:"l_pcvtp",label:"PCV/TP"},{id:"l_glu",label:"血糖"},{id:"l_lactate",label:"乳酸"},{id:"l_gas",label:"血液ガス"},{id:"l_lyte",label:"電解質（Na/K/Cl/iCa）"},{id:"l_k",label:"K（カリウム）単独"},{id:"l_chem",label:"生化学（BUN/Cre/ALT等）"},{id:"l_coag",label:"凝固系"}]},
    {g:"尿検査", items:[{id:"l_ua",label:"尿検査"},{id:"l_sediment",label:"尿沈渣"},{id:"l_uculture",label:"尿培養"}]},
    {g:"感染症検査", items:[{id:"l_snap",label:"SNAP/感染症検査"}]},
    {g:"内分泌検査", items:[{id:"l_cortisol",label:"基礎コルチゾール"},{id:"l_acthstim",label:"ACTH刺激試験"},{id:"l_acth",label:"内因性ACTH"}]},
    {g:"生理検査", items:[{id:"l_bp",label:"血圧測定"},{id:"l_ecg",label:"心電図"}]},
    {g:"画像：レントゲン（X線）", items:[{id:"l_thorax",label:"胸部X線"},{id:"l_abd",label:"腹部X線"},{id:"l_spine",label:"脊椎X線（頚部）"}]},
    {g:"髄液・神経", items:[{id:"l_csf",label:"脳脊髄液検査（CSF）"}]},
    {g:"画像：超音波（エコー）", items:[{id:"l_us",label:"腹部超音波"},{id:"l_fast",label:"AFAST/TFAST"},{id:"l_echo",label:"心エコー"}]},
    {g:"画像：CT/MRI", items:[{id:"l_ctmri",label:"CT/MRI"}]},
  ]},
  { key:"proc", cat:"🛠 処置", search:false, items:[
    {id:"p_thoraco",label:"胸腔穿刺"},{id:"p_abdomino",label:"腹腔穿刺"},{id:"p_cysto",label:"膀胱穿刺"},
    {id:"p_ucath",label:"尿道カテーテル設置"},{id:"p_ogtube",label:"胃管（経口）"},{id:"p_gastrocen",label:"胃穿刺（経皮減圧）"},
    {id:"p_intubate",label:"気管挿管"},{id:"p_chesttube",label:"胸腔ドレーン"},{id:"p_transfuse",label:"輸血"},
    {id:"p_wound",label:"創処置"},{id:"p_surgery",label:"緊急手術"},
    {id:"p_brace",label:"頸部スプリント/ケージレスト固定"},{id:"p_immobil",label:"脊椎の中立固定（バックボード）"},
  ]},
];

// ---------- 問診（系統別チップ）・自由入力照合 ----------
const HX_GROUPS=[
  {g:"主訴", items:[["hx_cc","主訴（どうされましたか）"],["hx_onset","発症様式・時期"],["hx_course","持続・経過"],["hx_trigger","誘因・きっかけ"]]},
  {g:"随伴症状", items:[["hx_appetite","食欲・嘔吐・排便"],["hx_urine","排尿の状況"],["hx_resp","呼吸・咳・運動耐性"],["hx_fever","発熱・元気"],["hx_neuro","発作・ふらつき"]]},
  {g:"既往・内服・生活", items:[["hx_pmh","既往歴・現在の投薬"],["hx_tox","誤食・中毒・外傷"],["hx_diet","食事・飲水・環境"],["hx_vacc","ワクチン・予防歴"]]},
];
const HX_KW={ hx_cc:["主訴","どうし","どうされ","訴え","なに","何が"],hx_onset:["いつ","発症","時期","始ま","から","波","だんだん"],
  hx_course:["経過","続","ずっと"],hx_trigger:["誘因","きっかけ","原因","前に","ストレス","ホテル","トリミング","散歩","あと","直後"],
  hx_appetite:["食欲","嘔吐","吐","食べ","ごはん","便","下痢","うんち","回数","何回","回","性状","程度","ひどい","水様","血便","泥状","色","どんな"],hx_urine:["尿","おしっこ","排尿","トイレ","出ない"],
  hx_resp:["呼吸","咳","息","苦し","ハァ"],hx_fever:["発熱","熱","元気","ぐったり"],hx_neuro:["発作","ふらつき","痙攣","けいれん","めまい","倒れ"],
  hx_pmh:["既往","過去","以前","前","持病","薬","内服","治療","繰り返","昔","点滴","注射","ステロイド"],hx_tox:["誤食","中毒","異物","拾い","外傷","事故","ぶつ"],
  hx_diet:["食事","水","飲","フード","環境","室内"],hx_vacc:["ワクチン","予防","接種"] };

// ---------- 身体診察（系統別） ----------
const EXAM_GROUPS=[
  {g:"バイタル（手で測定）", items:[["ex_tpr","TPR測定（体温・心拍・呼吸数）"],["ex_femoral","大腿動脈（股）の触知"]]},
  {g:"全身", items:[["ex_general","全体の様子・意識"],["ex_posture","体位・姿勢"]]},
  {g:"皮膚・粘膜", items:[["ex_mm","可視粘膜色・CRT"],["ex_hydration","皮膚ツルゴール・脱水"],["ex_skin","皮膚・浮腫"]]},
  {g:"頭頸部", items:[["ex_eye","眼瞼結膜"],["ex_jugular","頸静脈"],["ex_oral","口唇・口腔"]]},
  {g:"循環器", items:[["ex_pulse","末梢動脈の触知"],["ex_heart","心音聴診"]]},
  {g:"呼吸器", items:[["ex_thorax","肺音聴診"],["ex_effort","呼吸様式"]]},
  {g:"腹部", items:[["ex_abd","腹部触診"]]},
  {g:"泌尿生殖・会陰", items:[["ex_perineum","外陰部・会陰"]]},
  {g:"四肢・神経", items:[["ex_limb","四肢・疼痛"],["ex_neuro","神経学的検査（検査表）"],["ex_spine","脊柱・頸部の触診"],["ex_neckrom","頸部可動域（屈曲/伸展）検査"]]},
  {g:"体温", items:[["ex_temp","直腸温"]]},
];

// 全アクションのラベル表
const ALL_LABELS={};
CATALOG.forEach(c=>{
  if(c.items)c.items.forEach(it=>ALL_LABELS[it.id]=it.label);

/* ---------- 全症例共通：薬剤リスクエンジン ----------
   薬効クラス × 病態（dz/ライブ値）で副作用・禁忌を自動判定。症例側のresに書かない。
   判定はプレイ中には判定文を出さず（中立維持）、生理影響だけ適用し、最終評価で提示する。 */
const DRUG_CLASS={
  d_dexmed:"alpha2",d_medet:"alpha2",
  d_meloxicam:"nsaid",d_robena:"nsaid",
  d_furosem:"loop",
  d_buprenor:"opioid",d_butorph:"opioid",d_methadone:"opioid",d_fentanyl:"opioid",
  d_acepro:"phenothiazine", d_propofol:"induction", d_kcl:"kcl",
};
function drugRisk(id){
  const cls=DRUG_CLASS[id]; if(!cls)return;
  const h=S.h, dz=f=>S.dz.has(f), tx=f=>S.flags.has(f);
  const ev=(score,flag,msg)=>{ if(S.cflags.has(flag))return; S.score+=score; S.cflags.add(flag); S.adverseEvents.push({flag,score,msg,id}); };
  if(cls==="alpha2"){
    if(dz("heart_disease")||dz("hcm")||dz("chf_suspected")||dz("chf")) ev(-14,"alpha2_in_heart_disease","心疾患（疑い含む）にα2作動薬。徐脈・後負荷増大・心拍出量低下で悪化しうる。");
    if(dz("shock")||h.SBP<90) ev(-14,"alpha2_in_shock","ショック/低血圧にα2作動薬。循環虚脱を悪化させうる。");
    if(dz("hyperkalemia")||(h.K!=null&&h.K>=7)) ev(-12,"alpha2_in_hyperk","高K血症/徐脈傾向にα2作動薬。徐脈・不整脈リスクが高い。");
    if(dz("respiratory_distress")||h.SpO2<90) ev(-8,"alpha2_in_resp","呼吸困難にα2作動薬。換気・酸素化評価が困難になり急変リスク。");
    h.HR-=20; h.SBP-=5; S.cflags.add("alpha2_bradycardia");
  }
  if(cls==="nsaid"){
    if(dz("postrenal_aki")||dz("aki")||dz("prerenal_azotemia")||(h.Cre!=null&&h.Cre>2)) ev(-16,"nsaid_in_aki","AKI/腎前性・腎後性高窒素血症が疑われる状況でNSAID。腎血流低下を助長しうる。");
    if(dz("shock")||h.SBP<90||dz("hypovolemia")) ev(-12,"nsaid_in_shock","ショック・脱水下のNSAID。腎・消化管障害リスクが高い。");
  }
  if(cls==="loop"){
    if(dz("urinary_obstruction")&&!tx("p_ucath")){ ev(-14,"furosemide_before_relief","尿道閉塞解除前のフロセミド。根本治療にならず脱水・循環不全を悪化させうる。"); h.SBP-=8; }
    if(dz("shock")||h.SBP<90) ev(-10,"diuretic_in_shock","ショックに利尿薬。循環血液量低下を悪化させうる。");
  }
  if(cls==="opioid"){ if(h.RR<8||h.SpO2<85) ev(-8,"opioid_hypovent","低換気/低酸素にオピオイド。呼吸抑制に注意。"); S.cflags.add("recent_opioid"); }
  if(cls==="phenothiazine"){ if(dz("shock")||h.SBP<90||dz("hypovolemia")) ev(-10,"acepro_in_shock","ショック/低血圧にアセプロマジン。血管拡張で悪化させうる。"); }
  if(cls==="induction"){ if(h.SpO2<92) { ev(-8,"propofol_apnea","不安定下のプロポフォール。無呼吸・低血圧リスク。"); S.cflags.add("propofol_apnea"); } }
  if(cls==="kcl"){ if((h.K!=null&&h.K>=5.5)||dz("hyperkalemia")){ ev(-25,"kcl_in_hyperk","高K血症にKClを投与。致死性不整脈・CPAリスクがある。"); if(h.K!=null)h.K+=0.8; S.dz.add("iatrogenic_hyperkalemia"); } }
}

const IMAGING_IDS=["l_thorax","l_abd","l_us","l_fast","l_echo","l_ctmri"];
const IMG_REGION={l_thorax:"thorax",l_abd:"abdomen",l_us:"abdomen",l_fast:"both",l_echo:"thorax",l_ctmri:"both"};
function imagingFor(id){
  const tr=S.C.truthImg; if(!tr)return null;

/* ---------- 検査の時系列化（LabTimeline）：現在のhidden値から生成し前回値と比較 ---------- */
const LAB_NORM={ K:[3.5,5.5,"mEq/L"], Na:[145,155,"mEq/L"], Cl:[105,120,"mEq/L"], iCa:[1.2,1.5,"mmol/L"],
  BUN:[16,36,"mg/dL"], Cre:[0.8,2.4,"mg/dL"], Glu:[70,150,"mg/dL"], lactate:[0,2.5,"mmol/L"],
  pH:[7.35,7.45,""], HCO3:[18,26,"mEq/L"], PCV:[30,45,"%"], TP:[6,8,"g/dL"] };
const LAB_DEF={ l_k:["K"], l_lyte:["Na","K","Cl","iCa"], l_gas:["pH","HCO3","K","lactate"],
  l_chem:["BUN","Cre","Glu"], l_lactate:["lactate"], l_glu:["Glu"], l_pcvtp:["PCV","TP"] };
function flagOf(a,v){ const n=LAB_NORM[a]; if(!n)return''; if(v>n[1])return'hi'; if(v<n[0])return'lo'; return''; }
function fmtVal(a,v){ return a==="pH"?v.toFixed(2):(a==="K"||a==="iCa"||a==="lactate")?v.toFixed(1):Math.round(v); }
function labText(id){
  const keys=LAB_DEF[id]; if(!keys)return null;
  const parts=keys.map(a=>{ const v=S.h[a]; if(v==null)return null;
    const n=LAB_NORM[a]; const fl=flagOf(a,v); const arrow=fl==="hi"?"↑":fl==="lo"?"↓":"";
    const prev=S.labPrev[a]; let trend="";
    if(prev!=null){ const d=a==="pH"?0.02:(a==="K"||a==="lactate"||a==="iCa")?0.2:3;
      if(Math.abs(prev-v)>=d){ const mid=(n[0]+n[1])/2; const toward=Math.abs(v-mid)<Math.abs(prev-mid);
        trend=`（前回 ${fmtVal(a,prev)} → ${fmtVal(a,v)}・${toward?"正常方向":"悪化方向"}）`; } }
    return `${a} ${fmtVal(a,v)}${arrow}${trend}`;
  }).filter(Boolean);
  // Na:K比（電解質を測ったとき）
  if(keys.includes("Na")&&keys.includes("K")&&S.h.Na!=null&&S.h.K!=null){ const rt=S.h.Na/S.h.K;
    parts.push("Na:K比 "+rt.toFixed(0)+(rt<28?"↓（基準 27–40）":"")); }
  keys.forEach(a=>{ if(S.h[a]!=null){ S.labTimeline.push({a,v:S.h[a],t:S.t,id}); S.labPrev[a]=S.h[a]; } });
  // 異常の有無で赤字判定用フラグ
  const anyAbn=keys.some(a=>S.h[a]!=null&&flagOf(a,S.h[a]));
  // 文脈依存の臨床的意味は「最終評価の解説」に回す（プレイ中は素のデータのみ＝プレイヤーが解釈する）
  const ic=S.C.interp;
  if(ic){ keys.forEach(a=>{ if(ic[a]){ const t=ic[a](S); if(t)S.labInterps[a]=t; } }); }
  return {text:parts.join("、")+"。", abn:anyAbn};
}

/* ---------- グローバルCPAトリガーエンジン ---------- */
const REVERSIBLE_CAUSES=["hyperkalemia","iatrogenic_hyperkalemia","oxygenation_failure","ventilation_failure","drug_induced","sedation_related_cpa","anesthesia_related_cpa","obstructive_shock","shock_lactic_acidosis"];
function causeLabel(c){return {hyperkalemia:"高カリウム血症",iatrogenic_hyperkalemia:"医原性高K血症",oxygenation_failure:"低酸素",ventilation_failure:"換気不全/呼吸停止",drug_induced:"薬剤性呼吸抑制(オピオイド)",sedation_related_cpa:"鎮静関連(α2)",anesthesia_related_cpa:"麻酔関連",obstructive_shock:"閉塞性ショック",shock_lactic_acidosis:"ショック/高乳酸",circulatory_collapse:"循環虚脱",malignant_arrhythmia:"致死性不整脈",unknown:"原因不明"}[c]||c;}
function evaluateCPA(){
  if(S.arrest||S.dead||S.rosc)return;
  const h=S.h, dz=f=>S.dz.has(f), cf=f=>S.cflags.has(f);
  let r=null;
  if(dz("vf")) r={category:"malignant_arrhythmia",rhythm:"vf",preventable:true};
  else if(dz("asystole")) r={category:"malignant_arrhythmia",rhythm:"asystole",preventable:true};
  else if(h.K!=null && h.K>=9.5) r={category:cf("kcl_in_hyperk")?"iatrogenic_hyperkalemia":"hyperkalemia",rhythm:"asystole",reversibleCause:"hyperkalemia",iatrogenic:cf("kcl_in_hyperk"),preventable:true};
  else if(h.SpO2<60) r={category:"oxygenation_failure",rhythm:"pea",reversibleCause:"hypoxia",preventable:true};
  else if(cf("alpha2_bradycardia")&&h.HR<40&&h.SBP<60) r={category:"sedation_related_cpa",rhythm:"pea",reversibleCause:"alpha2",iatrogenic:true,preventable:true};
  else if(cf("opioid_hypovent")&&h.RR<5&&h.SpO2<85) r={category:"drug_induced",rhythm:"pea",reversibleCause:"opioid",iatrogenic:true,preventable:true};
  else if(cf("propofol_apnea")&&h.SpO2<75) r={category:"anesthesia_related_cpa",rhythm:"pea",iatrogenic:true,preventable:true};
  else if(dz("tension_pneumothorax")&&h.SpO2<75&&h.SBP<70) r={category:"obstructive_shock",rhythm:"pea",reversibleCause:"tension_pneumothorax",preventable:true};
  else if(dz("cardiac_tamponade")&&h.SBP<60) r={category:"obstructive_shock",rhythm:"pea",reversibleCause:"tamponade",preventable:true};
  else if(h.SBP<45) r={category:"circulatory_collapse",rhythm:"pea",preventable:true};
  else if(h.SBP<60 && h.lactate!=null && h.lactate>9) r={category:"shock_lactic_acidosis",rhythm:"pea",reversibleCause:"shock",preventable:true};
  if(r){ S.arrest=true; S.cpaCtx=r; }
}

  h+=`<div class="sub">脳神経 cranial nerves</div><div class="log">`+row("所見",nd.cn)+`</div>`;

function scoreNeuro(){
  if(!S.C.neuro)return null;
  const nd=S.C.neuro, ans=S.neuroAnswer, correctLoc=nd.loc, correct=new Set(nd.reasons||[]);
  let pts=0; const lines=[];
  if(!ans||!ans.loc){ lines.push(["bad","神経局在の解釈を行わなかった（検査データの解釈は重要な訓練）。"]); return {pts:-8,lines,correctLoc,done:false}; }
  if(ans.loc===correctLoc){ pts+=18; lines.push(["ok",`病変部位の解釈：${ans.loc}（適切）`]); }
  else { pts-=8; lines.push(["bad",`病変部位の解釈：${ans.loc}（客観データに整合する局在は ${correctLoc}）`]); }
  const sel=new Set(ans.reasons||[]); let rc=0,rw=0;
  for(const r of sel){ if(correct.has(r)){rc++;pts+=2;} else {rw++;pts-=2;} }
  const missed=[...correct].filter(r=>!sel.has(r));
  lines.push([rw?"warn":"ok",`根拠の選択：適切 ${rc} ／ 不適切 ${rw} ／ 取りこぼし ${missed.length}`]);

    if(S.flags.has("ex_neckrom")){ lines.push(["bad","危険な頸部可動域検査を実施した（脊髄損傷を悪化させうる）。"]); }

  }
  return {pts,lines,correctLoc,done:true};
}

  } else if(tempo==="subacute"){

    else { note="状態に見合った段階的対応ができていれば良い。悪化兆候の再評価は継続する。"; chip='ok'; }
  } else { note="当日対応の症例。安定化と並行して当日中に評価・治療を開始する。"; chip='neu'; }
  return {tempo,TD,note,chip,adj};
}
// ⑥ 蘇生後（PCA）バンドル。ROSC後にのみ評価。RECOVER 2024の蘇生後ケアに沿った監視・管理ドメイン。
function pcaBundle(){
  if(!S.rosc) return null;
  const F=S.flags||new Set(), CF=S.cflags||new Set();
  const has=(...ids)=>ids.some(i=>F.has(i));
  const causeDone = CF.has("cause_addressed")||has("p_ucath","p_surgery","p_gastrocen","p_ogtube")||CF.has("k_shift")||CF.has("gastropexy")||has("d_dexins","d_hydro","d_pred");
  const items=[
    ["酸素化", has("o2","monitor"), "SpO₂を保ち、高濃度酸素の漫然投与（高酸素）は避ける"],
    ["換気(ETCO₂/RR)", has("monitor","ex_tpr","o2"), "正常炭酸ガスを目標に。過換気は脳灌流を下げる"],
    ["血圧/灌流", has("l_bp","bolus","bigbolus","fluids","monitor"), "MAPを保つ。輸液、必要なら昇圧"],
    ["ECG/リズム", has("l_ecg","monitor"), "再CPA・不整脈を監視する"],
    ["血糖", has("l_glu","l_chem"), "低血糖・高血糖いずれも回避する"],
    ["電解質(K)", has("l_lyte","l_k","l_gas"), "特にKを再評価する"],
    ["乳酸/酸塩基", has("l_lactate","l_gas"), "灌流回復の指標として追う"],
    ["体温", has("ex_tpr","warm","cool"), "高体温は避け、低体温は緩徐に復温する"],
    ["原因治療", causeDone, "可逆的原因を治療しないと再CPAしやすい"],
    ["神経状態", has("ex_neuro"), "意識・脳幹反射・発作の有無を評価する"],
  ];
  const done=items.filter(i=>i[1]).length;
  const bonus=Math.round(done/items.length*8);
  return {items,done,total:items.length,bonus};
}

function tick(){
  if(S.dead||S.paused)return; S.t+=STEP; if(S.caT>0)S.caT-=STEP; // 問診中(S.paused)は時計を止める
  S.C.physiology(S);
  if(S.flags.has("monitor")){ for(const k of ["HR","SBP","SpO2","RR"]){ if(!S.revealed.has(k))continue;
    if(isNaN(S.disp[k]))S.disp[k]=S.h[k]; S.disp[k]+=(S.h[k]-S.disp[k])*0.5; } }
  evaluateCPA();
  if(S.arrest&&!S.rosc&&!S.dead&&!S.cpr)enterCPR();
  render();
}
// 行為の所要時間ぶん病態を進める（CT 600秒・X線保定120秒・手術等の時間経過を病態に反映）
function advanceTime(seconds){
  let rem=seconds||0;
  while(rem>0 && !S.dead && !S.cpr && !S.rosc){
    const dt=Math.min(STEP,rem); S.t+=dt; if(S.caT>0)S.caT-=dt;
    S.C.physiology(S);
    evaluateCPA();
    if(S.arrest&&!S.rosc&&!S.cpr){ enterCPR(); return; }
    rem-=dt;
  }
  if(S.flags.has("monitor")){ for(const k of ["HR","SBP","SpO2","RR"]) if(S.revealed.has(k)) S.disp[k]=S.h[k]; }
}

// ---------- アクション ----------
function res(id){ return (S.C.res&&S.C.res[id])?S.C.res[id]:defaultResult(id); }
function resolveResult(id){ // doAction用：症例res→画像truth→薬剤(中立)→default
  if(id==="ex_tpr"){ const T=S.h.temp,P=Math.round(S.h.HR),R=Math.round(S.h.RR);
    const ab=(P<60||P>180||R<8||R>40||T<37.5||T>39.5);
    return {text:`体温 ${T.toFixed(1)}℃ ／ 心拍 ${P}回/分 ／ 呼吸 ${R}回/分`, reveal:["HR","RR","temp"], s:4, time:60, tag:"good", abn:ab}; }
  if(id==="ex_femoral"){ const q=S.h.SBP>=95?"良好で力強い":S.h.SBP>=80?"やや弱い":"微弱"; const ab=S.h.SBP<90;
    return {text:`大腿動脈拍動は${q}。`, s:3, time:60, tag:"good", abn:ab}; }
  if(S.C.res&&S.C.res[id])return S.C.res[id];
  if(actionType(id)==="lab"&&IMAGING_IDS.includes(id)){ const im=imagingFor(id); if(im)return im; }
  if(actionType(id)==="drug"&&DRUG_CLASS[id])return {text:"投与した。",time:60,s:0}; // 副作用は薬剤リスクエンジンで処理
  return defaultResult(id);
}
function preApply(id){ // 初期装着（時間を消費せず実施済みにする）
  const r=res(id); S.sel.add(id);S.flags.add(id);S.scored.add(id);
  if(r.reveal)r.reveal.forEach(k=>S.revealed.add(k));
  if(r.flag)r.flag.forEach(f=>S.cflags.add(f));
  if(typeof r.s==="number")S.score+=r.s;
  for(const k of ["HR","SBP","SpO2","RR"]) if(S.revealed.has(k))S.disp[k]=S.h[k];
  S.snap[id]={t:0,HR:Math.round(S.h.HR),SBP:Math.round(S.h.SBP),SpO2:Math.round(S.h.SpO2),temp:S.h.temp};
}
function doAction(id){
  if(S.dead)return;
  if(id==="ex_neuro"&&S.C.neuro&&S.scored.has("ex_neuro")){ openNeuroExam(); return; } // 再クリックで解釈モーダルを開き直す
  const C=S.C, isLab=actionType(id)==="lab", first=!S.scored.has(id);
  if(!first&&!isLab){ return; }
  const r0=resolveResult(id);
  const r = LAB_DEF[id] ? Object.assign({},r0,labText(id)||{}) : r0; // 検査は現在のhidden値から生成（前回値比較）
  S.sel.add(id); S.flags.add(id);
  if(r.reveal)r.reveal.forEach(k=>S.revealed.add(k));
  if(first){
    if(actionType(id)==="drug")drugRisk(id); // 全症例共通の薬剤リスク判定（生理影響を先に反映）
    if(typeof r.fx==="function")r.fx(S);
    if(r.flag)r.flag.forEach(f=>S.cflags.add(f));
    if(typeof r.s==="number")S.score+=r.s;
    if(r.need)r.need.forEach(n=>{ if(n.f.some(f=>!S.cflags.has(f))){ S.score+=n.pen; if(n.msg)logWarn(n.msg);} });
    if(r.contra)r.contra.forEach(c=>{ const hit=c.invert?c.f.some(f=>!S.cflags.has(f)):c.f.some(f=>S.cflags.has(f)); if(hit){ S.score+=c.pen; if(c.msg)logWarn(c.msg);} });
    S.snap[id]={t:S.t,HR:Math.round(S.h.HR),SBP:Math.round(S.h.SBP),SpO2:Math.round(S.h.SpO2),temp:S.h.temp};
    S.scored.add(id);
  }
  if(isLab&&C.recheckBonus&&C.recheckBonus[id]&&S.flags.has(C.recheckGate||"p_ucath")&&!S.cflags.has("rk_"+id)){
    S.cflags.add("rk_"+id); S.score+=C.recheckBonus[id]; logWarn("根本治療後の再評価（適切）。");
  }
  const rtext=`${r.text}${(!first&&isLab)?'（再評価）':''}`;
  const _ty=actionType(id);
  const abn = LAB_DEF[id] ? (r.abn===true)  // 数値検査は値ベース（正常値は赤くしない）
    : (['hx','exam','lab'].includes(_ty)&&((S.C.res&&S.C.res[id]&&!S.C.res[id].norm)||r.abn===true));
  S.results.unshift({id,t:S.t,text:rtext,type:_ty,abn});
  log(`${labelOf(id)}：${rtext}`);
  if(id==="monitor"){ for(const k of ["HR","SBP","SpO2","RR"]) if(S.revealed.has(k))S.disp[k]=S.h[k]; }
  if(id==="ex_tpr"){ S.disp.HR=S.h.HR; S.disp.RR=S.h.RR; } // 手で測ったTPRの値を表示
  advanceTime(actionType(id)==='hx'?0:(r.time||60)); // 問診は時間を消費しない（現場の会話は短時間）。それ以外は所要時間ぶん進める
  if(S.cpr)return;         // CPRモードへ遷移したら通常UIは更新しない
  if(id==="ex_neuro"&&S.C.neuro&&first){ render(); openNeuroExam(); return; } // 神経検査：客観データ＋局在解釈モーダル
  render(); if(reopen)reopen();
}

function render(){
  document.getElementById('clock').textContent=fmt(S.t);
  const showV=k=>(S.revealed.has(k)&&!isNaN(S.disp[k]));            // 手でも分かる（HR/RR：TPRでも可）
  const show=k=>(S.flags.has("monitor")&&S.revealed.has(k)&&!isNaN(S.disp[k])); // 機器が要る（SBP/SpO₂）
  set('nHR',S.arrest?"0":showV("HR")?Math.round(S.disp.HR):"–");
  if(S.arrest)set('nBP',"–"); else if(show("SBP")){const sb=Math.round(S.disp.SBP),db=Math.round(S.disp.SBP*0.62);
    document.getElementById('nBP').innerHTML=sb+"/"+db;} else set('nBP',"–");

  set('nRR',S.arrest?"0":showV("RR")?Math.round(S.disp.RR):"–");

  if(show("SpO2")&&S.disp.SpO2<80)warn.push("重度低酸素");
  if(show("SBP")&&S.disp.SBP<70)warn.push("重度低血圧");

  if(warn.length)sb.push('<span style="color:#ff9aa6;font-weight:700">⚠ '+warn.join("・")+"（CPA前段階・介入を）</span>");

// ---------- モニター波形（ECG/動脈圧/プレチスモ） ----------
function setupMon(){ const c=document.getElementById('mon'); wf={c,ctx:c.getContext('2d'),x:0,ph:0,buf3:[[],[],[]]};
  const W=c.width; for(let i=0;i<3;i++)wf.buf3[i]=new Array(W).fill(null); if(wf.raf)cancelAnimationFrame(wf.raf); loopMon(); }
function loopMon(){
  const {c,ctx}=wf,W=c.width,H=c.height,laneH=H/3;
  ctx.fillStyle="#03100a";ctx.fillRect(0,0,W,H);
  ctx.strokeStyle="#0c2a1a";ctx.lineWidth=1; for(let x=0;x<W;x+=18){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  const mon=S&&S.flags.has("monitor")&&S.revealed.has("HR");
  const hr=(!S||S.arrest)?0:(mon?S.disp.HR:0); const beat=hr>0?Math.max(14,(60/hr)*110):0;
  for(let s=0;s<4;s++){ wf.x=(wf.x+1)%W; let ph=wf.ph;
    if(mon&&!S.arrest){ wf.ph+=1/beat; if(wf.ph>=1)wf.ph-=1; ph=wf.ph; }
    const samp=[
      mon?(S.arrest?0:ecgSample(ph)) : null,
      (mon&&!S.arrest)?artSample(ph) : null,
      (mon&&!S.arrest)?plethSample(ph) : null,
    ];
    for(let i=0;i<3;i++){ const base=laneH*(i+0.5); let y=base;
      if(samp[i]==null)y=base; else y=base - samp[i]*laneH*0.40;
      wf.buf3[i][wf.x]=y; for(let k=1;k<6;k++)wf.buf3[i][(wf.x+k)%W]=null; }
  }
  const colors=[mon?"#37e08a":"#15402b", mon?"#ff6d7a":"#3a1820", mon?"#5fd0ff":"#16344a"];
  for(let i=0;i<3;i++){ ctx.strokeStyle=colors[i];ctx.lineWidth=2;ctx.beginPath();let st=false;
    for(let x=0;x<W;x++){ const y=wf.buf3[i][(wf.x+1+x)%W]; if(y==null){st=false;continue;} if(!st){ctx.moveTo(x,y);st=true;}else ctx.lineTo(x,y);} ctx.stroke(); }
  if(!mon){ ctx.fillStyle="#2a6b4a";ctx.font="12px ui-monospace";ctx.fillText("モニター未装着",W/2-44,H/2);}
  wf.raf=requestAnimationFrame(loopMon);
}
function ecgSample(p){
  const K=(S&&(S.revealed.has("K")||S.cflags&&S.cflags.has("hyperk_known")))?S.h.K:5; // ECGで高K形態は出すが数値は伏せる
  const tAmp=clamp(0.18+(K-5.5)*0.16,0.12,0.9),pW=Math.max(0,(7-K)/3.5);
  let v=0;v+=pW*0.18*g(p,0.12,0.02);v+=-0.12*g(p,0.27,0.01);v+=1.0*g(p,0.30,0.008);v+=-0.22*g(p,0.33,0.012);
  v+=tAmp*g(p,0.55,clamp(0.06-(K-5.5)*0.006,0.022,0.06));return v;
}
function artSample(p){ // 動脈圧：立ち上がり＋ディクロティックノッチ
  let v=0.15; v+=0.9*Math.max(0,Math.sin(Math.PI*Math.min(1,p/0.35)))*(p<0.35?1:0);
  if(p>=0.35)v=0.15+0.55*Math.exp(-(p-0.35)*3.2)+0.12*g(p,0.5,0.03);
  return v-0.3;
}
function plethSample(p){ let v=Math.max(0,Math.sin(Math.PI*Math.min(1,p/0.5)))*0.8+0.08*g(p,0.6,0.05); return v-0.35; }
function g(x,m,s){const d=x-m;return Math.exp(-(d*d)/(2*s*s));}

function snapStr(id){ const s=S.snap[id]; if(!s)return''; return `<span class="vsnap">[${fmt(s.t)}] HR${s.HR}/SAP${s.SBP}/SpO₂${s.SpO2}/${s.temp.toFixed(1)}℃</span>`; }
function showResult(){
  document.getElementById('sim').classList.add('hide'); closeSheet();
  const C=S.C; let score=S.score;
  const crit=[],good=[],harm=[],unnec=[];
  // 必須行為はグループ化（同じ情報を測る検査はどれか1つでOK＝二重減点/二重加点を防ぐ）
  const cg={};
  for(const id in (C.res||{})){ const r=C.res[id];
    if(r.tag==="critical"){ const g=r.critGroup||id;
      (cg[g]=cg[g]||{ids:[],label:r.critLabel||labelOf(id),miss:0}).ids.push(id);
      if(typeof r.miss==="number")cg[g].miss=Math.min(cg[g].miss,r.miss); }
    else if(r.tag==="good"&&S.sel.has(id))good.push(id);
    else if(r.tag==="harmful"&&S.sel.has(id))harm.push({id,v:r.verdict||r.text}); }
  for(const g in cg){ const G=cg[g], doneIds=G.ids.filter(i=>S.sel.has(i));
    if(doneIds.length){ // 重複測定の二重加点を相殺（グループは1回ぶんの価値）
      const sList=doneIds.map(i=>C.res[i].s||0); score-=(sList.reduce((a,b)=>a+b,0)-Math.max(...sList));
      crit.push({id:doneIds[0],label:G.label,ok:true});
    } else { score+=G.miss; crit.push({id:G.ids[0],label:G.label,ok:false}); } }
  for(const id of S.sel){ if(!(C.res&&C.res[id])){ const t=actionType(id); if(t==="lab"||t==="drug"||t==="proc")unnec.push(id);} }
  const dxPrimary=S.dx.has(C.primaryDx),dxHit=[...S.dx].some(d=>C.correctDx.includes(d));
  const dxWrong=[...S.dx].filter(d=>!C.correctDx.includes(d));
  const dr=C.dxReq||{};
  const comorbidHit=(dr.comorbid||[]).filter(d=>S.dx.has(d)).length;
  const onlyWrong = !dxPrimary && (dr.wrongIfOnly||[]).some(d=>S.dx.has(d));
  score+=(dxPrimary?25:dxHit?15:0)-Math.min(10,dxWrong.length*3)+comorbidHit*4-(onlyWrong?8:0);
  const dispoOK=S.dispo&&C.correctDispo.includes(S.dispo); score+=dispoOK?12:(S.dispo?-6:0);
  const timeBonus=(!S.dead&&S.t<900)?8:(!S.dead&&S.t<1500)?4:0; score+=timeBonus;
  if(S.dead)score-=25;
  const triage=triageEval(); if(triage)score+=triage.adj;
  const pca=pcaBundle(); if(pca)score+=pca.bonus;
  const neuro=scoreNeuro(); if(neuro)score+=neuro.pts;
  const pct=clamp(Math.round(score),0,100);
  const grade=pct>=85?"S":pct>=70?"A":pct>=55?"B":pct>=40?"C":"D";
  const gcol=(grade==="S"||grade==="A")?"var(--green)":grade==="B"?"var(--amber)":"var(--red)";

  let missHtml=crit.filter(c=>!c.ok).map(c=>`<div class="e"><span class="rchip bad">未実施</span>${c.label}</div>`).join('');
  let critOk=crit.filter(c=>c.ok).map(c=>`<div class="e"><span class="rchip ok">○ 適切</span>${c.label} ${snapStr(c.id)}</div>`).join('');
  let goodHtml=good.map(id=>`<div class="e"><span class="rchip ok">＋</span>${labelOf(id)} ${snapStr(id)}</div>`).join('');
  let harmHtml=harm.map(h=>`<div class="e"><span class="rchip bad">禁忌/不適切</span>${labelOf(h.id)} ${snapStr(h.id)}<div class="tiny">${h.v}</div></div>`).join('');
  let unnecHtml=unnec.map(id=>`<div class="e"><span class="rchip neu">−</span>${labelOf(id)}（診断価値が低い） ${snapStr(id)}</div>`).join('')
    +dxWrong.map(d=>`<div class="e"><span class="rchip neu">−</span>余分な鑑別：${dxLabel(d)}</div>`).join('');
  const dxLine=`<div class="e"><span class="rchip ${dxPrimary||dxHit?'ok':'bad'}">${dxPrimary||dxHit?'○':'×'} 診断</span>${dxPrimary?'正解：'+dxLabel(C.primaryDx):dxHit?'関連診断は選べた':'主たる正解は「'+dxLabel(C.primaryDx)+'」'}${dr.comorbid?`<div class="tiny">併存病態の認識：${comorbidHit}/${dr.comorbid.length}${onlyWrong?'　／ 非閉塞性のみと判断するのは危険':''}</div>`:''}</div>`;
  const dispoLine=`<div class="e"><span class="rchip ${dispoOK?'ok':'bad'}">${dispoOK?'○':'×'} 方針</span>${dispoOK?DISPOSITIONS.find(d=>d[0]===S.dispo)[1]:'適切な転帰ではない'}</div>`;
  let advHtml=S.adverseEvents.length?S.adverseEvents.map(a=>`<div class="e"><span class="rchip bad">${a.score}</span>${labelOf(a.id)}：${a.msg}</div>`).join(''):'';

  document.getElementById('result').classList.remove('hide');
  document.getElementById('result').innerHTML=`
    <div style="text-align:center;margin:6px 0 10px"><div class="pill">結果</div>
      <div class="scoreBig" style="color:${gcol}">${grade}</div>
      <div class="sub">スコア ${pct} 点　／　所要 ${fmt(S.t)}${S.dead?'　/　救命できず':S.rosc?'　/　一度心停止':''}</div></div>
    ${triage?`<div class="card"><div class="sub">⏱ 緊急度（トリアージ）の評価</div><div class="log"><div class="e"><span class="rchip ${triage.chip}">${triage.TD.label}</span><span style="color:${triage.TD.col}">${triage.TD.desc}</span></div><div class="e tiny">${triage.note}</div></div></div>`:''}
    ${missHtml?`<div class="card"><div class="sub">❗ 必要だったのに行わなかったこと</div><div class="log">${missHtml}</div></div>`:''}
    <div class="card"><div class="sub">✅ 適切だった行動・診断・方針</div><div class="log">${critOk}${goodHtml}${dxLine}${dispoLine}</div></div>
    ${neuro?`<div class="card" style="border-color:#2c5a78"><div class="sub">🧠 神経局在の解釈（客観データ→局在）</div><div class="log">${neuro.lines.map(l=>`<div class="e"><span class="rchip ${l[0]}">${l[0]==='ok'?'○':l[0]==='bad'?'×':l[0]==='warn'?'△':'·'}</span>${l[1]}</div>`).join('')}<div class="e tiny">客観的な検査データから自分で病変部位を絞り込む訓練。所見の解釈こそが診断推論の核心。</div></div></div>`:''}
    ${pca?`<div class="card" style="border-color:${pca.done>=8?'#1d6b50':pca.done>=5?'#6b561d':'#6b2330'}"><div class="sub">🫀 蘇生後（PCA）ケア・バンドル　${pca.done}/${pca.total} 項目</div><div class="log">${pca.items.map(it=>`<div class="e"><span class="rchip ${it[1]?'ok':'bad'}">${it[1]?'○':'×'}</span>${it[0]}<div class="tiny">${it[2]}</div></div>`).join('')}<div class="e tiny">※ROSCはゴールではなく出発点。これらを継続監視し、可逆的原因の治療と再CPA予防を続ける。</div></div></div>`:''}
    ${harmHtml?`<div class="card"><div class="sub">⛔ 禁忌・不適切だった行動</div><div class="log">${harmHtml}</div></div>`:''}
    ${advHtml?`<div class="card"><div class="sub">💊 薬剤副作用・医原性（減点）</div><div class="log">${advHtml}</div></div>`:''}
    ${unnecHtml?`<div class="card"><div class="sub">▽ 影響の小さかった/不要な行動</div><div class="log">${unnecHtml}</div></div>`:''}
    ${Object.keys(S.labInterps||{}).length?`<div class="card"><div class="sub">📖 検査の読み方（解説）</div><div class="log">${Object.values(S.labInterps).map(t=>`<div class="e">${t}</div>`).join('')}</div></div>`:''}
    ${S.familyId&&FAMILY_DXFLOW[S.familyId]?`<div class="card" style="border-color:#2c5a78"><div class="sub">🧭 主訴からの鑑別の進め方（フローチャート）</div><p style="margin:6px 0">${FAMILY_DXFLOW[S.familyId]}</p></div>`:''}
    <div class="card"><div class="sub">📖 解説</div><p style="margin:6px 0">${C.finalNote}</p>
      <p class="tiny">※用量・手技・実診療判断は最新のガイドライン／添付文書／施設プロトコルで確認してください。</p></div>
    <button class="btn primary" onclick="${S.familyId?`startFamily('${S.familyId}')`:`startCase('${S.cid}')`}">▶ もう一度${S.familyId?'（別の症例になる）':''}</button>
    <button class="btn ghost" style="margin-top:8px" onclick="toStart()">トップへ</button>`;
  window.scrollTo(0,0);
}

  {id:"bicarb",label:"重炭酸ナトリウム",dose:1,unit:"mEq/kg"},
];
function rhythmName(r){return {unknown:"判定前",asystole:"心静止(asystole)",pea:"無脈性電気活動(PEA)",vf:"心室細動(VF)",pvt:"無脈性VT(PVT)",organized_with_pulse:"組織化リズム",rosc:"自己心拍(ROSC)"}[r]||r;}
function isShock(r){return r==="vf"||r==="pvt";}

let cprRaf=null;
function enterCPR(){
  const m=CPR_CASE[S.cid]||{species:(S.C.patient||"dog"),weightKg:10,chest:"cat_or_small_dog",cause:(S.cpaCtx&&S.cpaCtx.category)||"unknown",rhythm:(S.cpaCtx&&S.cpaCtx.rhythm)||"pea"};
  if(S.cpaCtx){ m.cause=S.cpaCtx.category; m.rhythm=S.cpaCtx.rhythm; m.iatrogenic=S.cpaCtx.iatrogenic; m.reversibleCause=S.cpaCtx.reversibleCause; }
  enterCPRWith(m);
}
function inferChest(species,kg){ if(species==="cat"||kg<12)return "cat_or_small_dog"; return "medium_large_keel_chested"; }
function enterCPRWith(m){
  S.cpr={ status:"cpa_suspected", m, totalSec:0, cycleSec:0, cycle:0,
    rhythm:"unknown", trueRhythm:m.rhythm, access:"none",
    q:{compStarted:false,rate:0,depth:"too_shallow",recoil:false,duty:false,handsOff:0,fatigue:0,techniqueOK:false,
       ventStarted:false,intubated:false,ventRate:0,chestRise:false,overVent:false},
    mon:{ecg:false,etco2:false,etco2v:null,art:false,dbp:null,lytes:false,K:null},
    drugs:[], defibs:[], flags:new Set(), score:0, log:[], roscProb:0, lastEpiSec:-999 };
  if(m.cause==="hyperkalemia"||m.cause==="iatrogenic_hyperkalemia")S.cpr.mon.K=((S.h&&S.h.K)||8.8);
  cprLog("CPAが疑われる。応援要請・反応確認・呼吸確認・BLS開始を行う。"+(m.iatrogenic?"（医原性の可能性）":""));
  if(timer){clearInterval(timer);timer=null;}
  closeSheet();
  document.getElementById('sim').classList.add('hide');
  document.getElementById('start').classList.add('hide');
  document.getElementById('result').classList.add('hide');
  document.getElementById('cpr').classList.remove('hide');
  if(cprRaf)cancelAnimationFrame(cprRaf); cprLoop();
  renderCPR();
}
// ---- CPR練習モード（CPAから直接開始）----
const CPR_PRESETS=[
  ["🐱 猫 4kg・高カリウム血症（PEA/asystole）","cat",4,"hyperkalemia","asystole"],
  ["🐕 犬 30kg・低酸素（PEA）","dog",30,"oxygenation_failure","pea"],
  ["🐕 犬 30kg・出血性ショック（PEA）","dog",30,"shock_lactic_acidosis","pea"],
  ["🐕 犬 30kg・心室細動 VF（除細動練習）","dog",30,"malignant_arrhythmia","vf"],
  ["🐱 猫 4kg・心室細動 VF（除細動練習）","cat",4,"malignant_arrhythmia","vf"],
  ["🐕 犬 8kg・麻酔/鎮静関連（PEA）","dog",8,"sedation_related_cpa","pea"],
];
function openCPRPractice(){
  let h=`<h3>🫀 CPR練習モード<button class="x" onclick="closeSheet()">×</button></h3>
    <p class="tiny">CPAから直接スタート（RECOVER 2024）。患者と原因・初期リズムを選んでください。VFを選ぶと除細動の練習ができます。</p>`;
  CPR_PRESETS.forEach((p,i)=>h+=`<button class="item" onclick="startCPRPractice(${i})"><span class="tick">▶</span><span>${p[0]}</span></button>`);
  openSheet(h);
}
function startCPRPractice(i){ const p=CPR_PRESETS[i];
  S={cid:'practice',C:{patient:p[1],finalNote:''},h:{K:p[3]==="hyperkalemia"?8.8:4.2,HR:0,SBP:0,SpO2:0,RR:0,temp:37},
     flags:new Set(),cflags:new Set(),revealed:new Set(),sel:new Set(),scored:new Set(),dx:new Set(),dispo:null,snap:{},results:[],
     dz:new Set(),adverseEvents:[],caT:0,stress:0,arrest:true,dead:false,rosc:false,cpr:null,score:0,log:[]};
  closeSheet();
  enterCPRWith({species:p[1],weightKg:p[2],chest:inferChest(p[1],p[2]),cause:p[3],rhythm:p[4]});
}
function cprLog(m){ S.cpr.log.push({t:S.cpr.totalSec,m}); }
function inPause(){ return S.cpr.status==="cycle_pause"; }

// --- BLS ---
function cprCall(id,msg){ const c=S.cpr; if(c.flags.has(id))return; c.flags.add(id); c.score+=4; cprLog(msg); renderCPR(); }
function cprStartBLS(){ const c=S.cpr; if(c.status==="cpa_suspected"){c.status="bls_active";c.score+=6;cprLog("BLSを開始。直ちに胸骨圧迫へ。");} renderCPR(); }
function cprCompress(){ const c=S.cpr; if(c.q.compStarted)return;
  c.status="bls_active"; c.q.compStarted=true;c.q.rate=110;c.q.depth="adequate";c.q.recoil=true;c.q.duty=true;
  c.score+=20;c.roscProb+=10; cprLog("胸骨圧迫を開始。100–120/分・胸郭1/3〜1/2・完全リコイル・50:50を目標。"); cprEtco2(); renderCPR(); }
function cprTechModal(){ let h=`<h3>圧迫位置（胸郭形態：${CHEST_LABEL[S.cpr.m.chest]}）<button class="x" onclick="closeSheet()">×</button></h3>`;
  TECHNIQUES.forEach(t=>h+=`<button class="item" onclick="cprTech('${t[0]}')"><span class="tick">＋</span><span>${t[1]}</span></button>`);
  openSheet(h); }
function cprTech(t){ const c=S.cpr; const ok=techniqueOK(c.m.chest,t);
  if(ok){c.score+=10;c.roscProb+=5;c.q.techniqueOK=true;cprLog("胸郭形態に合った圧迫位置を選択。");}
  else{c.score-=8;c.roscProb-=4;c.q.techniqueOK=false;cprLog("圧迫位置が胸郭形態に不適切。ETCO2/DBPが上がりにくい。");}
  cprEtco2(); closeSheet(); renderCPR(); }
function cprIntubate(){ const c=S.cpr; if(!c.q.compStarted){c.score-=10;cprLog("圧迫開始前に挿管を優先した。多人数CPRでは圧迫を遅らせない。");}
  c.q.intubated=true;c.q.ventStarted=true;c.q.ventRate=10;c.q.chestRise=true;c.score+=10;
  cprLog("気管挿管し、連続圧迫＋10回/分で換気開始。"); cprEtco2(); renderCPR(); }
function cprBagMask(){ const c=S.cpr; if(c.q.intubated){cprLog("挿管済み。挿管下換気を継続。");return;}
  c.q.ventStarted=true;c.q.chestRise=true;c.score+=6; cprLog("密着マスク＋酸素でバッグマスク換気（挿管前は30:2）。"); cprEtco2(); renderCPR(); }
function cprVentRate(r){ const c=S.cpr; c.q.ventRate=r;
  if(c.q.intubated){ if(r===10){c.score+=6;cprLog("挿管下10回/分。適切。");}
    else if(r>20){c.score-=10;c.q.overVent=true;c.roscProb-=5;cprLog("過換気。静脈還流と冠灌流を低下させうる。");}
    else{c.score-=3;cprLog("換気回数が推奨から外れている。");} }
  cprEtco2(); closeSheet(); renderCPR(); }
function cprVentModal(){ let h=`<h3>換気回数（挿管下）<button class="x" onclick="closeSheet()">×</button></h3>`;
  [6,10,15,25].forEach(r=>h+=`<button class="item" onclick="cprVentRate(${r})"><span class="tick">＋</span><span>${r} 回/分</span></button>`);
  openSheet(h); }

// --- ALS ---
function cprAttachECG(){ const c=S.cpr; if(c.mon.ecg)return; c.mon.ecg=true;c.score+=8;cprLog("ECGを装着。次のpauseでリズム判定。");renderCPR(); }
function cprAttachEtco2(){ const c=S.cpr; if(c.mon.etco2)return; c.mon.etco2=true;c.score+=10;cprLog("ETCO2を装着。CPR品質の指標にする（目標≥18 mmHg）。");cprEtco2();renderCPR(); }
function cprIV(){ const c=S.cpr; if(c.access==="iv")return; c.access="iv";c.score+=10;cprLog("IVアクセスを確保。CPR薬剤の優先経路。");cprEtco2();renderCPR(); }
function cprIO(){ const c=S.cpr; if(c.totalSec<120){c.score-=2;cprLog("IVを試す前にIOへ。状況によるが基本はIV優先。");}else{c.score+=8;cprLog("IV困難のためIOを確保。適切。");} c.access="io";cprEtco2();renderCPR(); }
function cprAssess(){ const c=S.cpr; if(!c.mon.ecg){cprLog("先にECGを装着してください。");return;}
  if(!inPause()){c.score-=8;cprLog("サイクル中のリズム判定は圧迫中断を招く。pauseで行う。");}
  else c.q.handsOff+=4;
  c.rhythm=c.trueRhythm;
  if(isShock(c.rhythm)){c.flags.add("shockable");cprLog("ショック適応："+rhythmName(c.rhythm)+"。除細動を最優先に。");}
  else{c.flags.add("nonshockable");cprLog("非ショック適応："+rhythmName(c.rhythm)+"。BLS継続・原因検索・血管確保・エピネフリン。");}
  renderCPR(); }
function cprDefib(wave){ const c=S.cpr;
  if(!isShock(c.rhythm)){c.score-=20;cprLog("非ショック適応リズムに除細動した。不適切。");renderCPR();return;}
  if(inPause())c.q.handsOff+=4;
  const prev=c.defibs.length;
  const j= wave==="biphasic"?(prev===0?2:4):(prev===0?4:8);
  // 手順が良いほど成功率↑・失敗が続くほど↑（完全な運ゲーにしない）
  const chance=0.30 + c.roscProb/150 + prev*0.10 + (c.flags.has("cause_addressed")?0.05:0);
  const ok=Math.random()<Math.max(0.10,Math.min(0.85,chance));
  c.defibs.push({cycle:c.cycle,j,wave,ok});
  c.score+= prev===0?20:12;
  cprLog((wave==="biphasic"?"二相性":"単相性")+`除細動 ${j} J/kg（${prev===0?"初回標準":"倍量維持"}）。`);
  if(ok){c.rhythm="organized_with_pulse";c.roscProb+=10;cprLog("組織化リズムへ変化。ROSC判定が必要。");}
  else{c.flags.add("refractory");cprLog("ショック適応持続。直ちに圧迫再開し次サイクルへ。");}
  renderCPR(); }
function cprDefibModal(){ openSheet(`<h3>除細動<button class="x" onclick="closeSheet()">×</button></h3>
  <p class="tiny">二相性：初回2 J/kg→以後4 J/kg　単相性：初回4 J/kg→以後8 J/kg（教育用・施設プロトコル確認）</p>
  <button class="item" onclick="closeSheet();cprDefib('biphasic')"><span class="tick">⚡</span><span>二相性で除細動</span></button>
  <button class="item" onclick="closeSheet();cprDefib('monophasic')"><span class="tick">⚡</span><span>単相性で除細動</span></button>`); }

function cprDrugModal(){ const c=S.cpr; const w=c.m.weightKg;
  let h=`<h3>薬剤投与<button class="x" onclick="closeSheet()">×</button></h3>
    <p class="tiny">体重 ${w} kg・経路 ${c.access==="none"?"未確保":c.access.toUpperCase()}。表示用量は教育用（実診療は施設プロトコル確認）。</p>`;
  CPR_DRUGS.forEach(d=>{ if(d.species&&d.species!==c.m.species)return;
    const dose=(d.dose*w); const ds=Number.isInteger(dose)?dose:dose.toFixed(2);
    h+=`<button class="item" onclick="cprDrug('${d.id}')"><span class="tick">＋</span><span>${d.label}　<span class="tiny">${ds} ${d.unit.replace('/kg','')}</span></span></button>`; });
  openSheet(h); }
function cprDrug(id){ const c=S.cpr; const d=CPR_DRUGS.find(x=>x.id===id); if(!d){return;}
  if(c.access==="none"){c.score-=10;cprLog(`${d.label}を投与しようとしたがIV/IO未確保。`);closeSheet();renderCPR();return;}
  if(inPause())c.q.handsOff+=3;
  c.drugs.push({id,route:c.access,cycle:c.cycle,t:c.totalSec});
  if(id==="epi_high"){c.score-=25;c.roscProb-=10;cprLog("高用量エピネフリン0.1 mg/kgを投与。RECOVER 2024では非推奨。大きく減点。");}
  else if(id==="epi_std"){
    if(c.rhythm==="pea"||c.rhythm==="asystole"){ const since=c.totalSec-c.lastEpiSec;
      if(since<180){c.score-=4;cprLog("前回エピから3分未満での反復。3–5分間隔で。");}
      else{c.score+=15;c.roscProb+=8;cprLog(`エピネフリン0.01 mg/kgを${c.access.toUpperCase()}投与。非ショック適応で適切。`);}
      c.lastEpiSec=c.totalSec;
    } else if(isShock(c.rhythm)){ if(c.defibs.length===0){c.score-=15;cprLog("初回除細動前のVF/PVTにエピ。RECOVER 2024では非推奨。");}
      else{c.score+=6;c.roscProb+=3;cprLog("難治性VF/PVTへの血管収縮薬としてエピを使用。");c.lastEpiSec=c.totalSec;} }
    else cprLog("エピネフリンを投与した。");
  }
  else if(id==="atropine"){ const n=c.drugs.filter(x=>x.id==="atropine").length;
    if(n>1){c.score-=15;cprLog("アトロピンを反復投与。RECOVER 2024では反復は非推奨。");}
    else if(c.rhythm==="pea"||c.rhythm==="asystole"){c.score+=5;cprLog("アトロピンを早期1回。迷走神経性CPA疑いで考慮。");}
    else{c.score-=4;cprLog("このリズムでのアトロピン適応は乏しい。");} }
  else if(id==="vaso"){ if(isShock(c.rhythm)&&c.defibs.length>=1){c.score+=8;c.roscProb+=4;cprLog("難治性VF/PVTにバソプレシン。");}
    else if(isShock(c.rhythm)){c.score-=8;cprLog("初回除細動前のバソプレシン。まず除細動。");}
    else cprLog("バソプレシンを投与した。"); }
  else if(id==="lidocaine"){ if(c.m.species!=="dog"){c.score-=10;cprLog("猫にリドカイン。猫の難治性VF/PVTはアミオダロン優先。");}
    else if(isShock(c.rhythm)){c.score+=8;c.roscProb+=4;cprLog("犬の難治性VF/PVTにリドカイン。");} else cprLog("リドカインを投与した。"); }
  else if(id==="amiodarone"){ if(c.m.species!=="cat"){c.score-=4;cprLog("犬にアミオダロン。犬はリドカインがより実用的。");}
    else if(isShock(c.rhythm)){c.score+=8;c.roscProb+=4;cprLog("猫の難治性VF/PVTにアミオダロン。");} else cprLog("アミオダロンを投与した。"); }
  else if(id==="naloxone"){ if(c.m.cause==="opioid_related"||c.m.cause==="respiratory"){c.score+=4;cprLog("ナロキソンを投与した。");}
    else{c.score-=2;cprLog("ナロキソンを投与したが、オピオイド関連の根拠は乏しい。");} }
  else if(id==="bicarb"){ if(c.m.cause==="hyperkalemia"){c.score+=8;c.roscProb+=4;cprLog("可逆的原因（高K血症）に重炭酸。");} else cprLog("重炭酸を投与した。"); }
  closeSheet(); cprEtco2(); renderCPR(); }

function cprLytes(){ const c=S.cpr; c.mon.lytes=true; if(c.mon.K==null)c.mon.K=((c.m.cause==="hyperkalemia"||c.m.cause==="iatrogenic_hyperkalemia")?8.5:4.2);
  c.score+=6; cprLog(`CPA中の電解質を確認。K=${c.mon.K.toFixed?c.mon.K.toFixed(1):c.mon.K} mEq/L。`);
  if(c.mon.K>6.5){c.flags.add("hyperK");cprLog("重度高K血症。可逆的原因として補正を検討（Ca/ブドウ糖+インスリン/重炭酸）。");}
  renderCPR(); }
// 可逆的原因の治療（CPA原因に応じて表示・ROSC確率に反映）
function causeTreatments(cause){
  if(cause==="hyperkalemia"||cause==="iatrogenic_hyperkalemia")return [["ca","グルコン酸カルシウム（心筋保護）"],["ins","ブドウ糖＋インスリン（K低下）"],["src","原因治療（閉塞解除/減圧）"]];
  if(cause==="oxygenation_failure")return [["o2","酸素化・気道確保"],["thoraco","胸腔穿刺/肺病変への介入"]];
  if(cause==="ventilation_failure")return [["intubate","挿管・確実な換気"]];
  if(cause==="drug_induced")return [["naloxone","ナロキソン（オピオイド拮抗）"]];
  if(cause==="sedation_related_cpa")return [["atipam","アチパメゾール（α2拮抗）"]];
  if(cause==="anesthesia_related_cpa")return [["airway","気道確保・循環補助"]];
  if(cause==="obstructive_shock")return [["thoraco","胸腔穿刺"],["pericardio","心嚢穿刺"]];
  if(cause==="shock_lactic_acidosis")return [["fluids","輸液/輸血で循環補正"],["decomp","原因の減圧/止血"]];
  return [];
}
function cprCauseRx(id){ const c=S.cpr; if(c.flags.has("ct_"+id))return; c.flags.add("ct_"+id); c.flags.add("cause_addressed");
  c.roscProb+=8; if(id==="ins"){c.flags.add("k_shift");if(c.mon.K!=null)c.mon.K=Math.max(5.5,c.mon.K-0.8);} if(id==="ca")c.flags.add("myocardium_stabilized");
  cprLog("可逆的原因（"+causeLabel(c.m.cause)+"）への治療を実施。ETCO₂・ROSCの可能性が上がる。"); cprEtco2(); renderCPR(); }

// --- ETCO2（CPR品質の教育的指標）---
function cprEtco2(){ const c=S.cpr; if(!c.mon.etco2){return;}
  let e=8; const q=c.q;
  if(q.compStarted)e+=5; if(q.rate>=100&&q.rate<=120)e+=3; if(q.depth==="adequate")e+=4;
  if(q.recoil)e+=2; if(q.duty)e+=1; if(q.techniqueOK)e+=3; if(q.ventStarted)e+=2; if(q.overVent)e-=4;
  if(c.access==="iv"||c.access==="io")e+=1;
  if(c.flags.has("cause_addressed"))e+=5; // 可逆的原因の治療で灌流改善
  c.mon.etco2v=Math.max(4,Math.min(45,e));
  if(c.mon.etco2v>=18)c.flags.add("etco2_target"); }

// --- サイクル ---
function cprRunCycle(){ const c=S.cpr; if(c.status!=="bls_active"){return;}
  if(!c.q.compStarted){cprLog("胸骨圧迫が未開始。まず圧迫を。");return;}
  c.totalSec+=120; c.cycleSec=0; c.q.fatigue+=1;
  if(c.q.fatigue>1){c.q.depth="too_shallow";c.roscProb-=2;cprLog("圧迫者の疲労で深度低下。次サイクルで交代を。");}
  c.status="cycle_pause"; c.q.handsOff=0; cprEtco2();
  cprLog("2分サイクル終了。10秒未満でリズム判定・圧迫者交代・必要処置を。"); renderCPR(); }
function cprNext(){ const c=S.cpr;
  if(c.q.handsOff>10){c.score-=10;c.roscProb-=5;cprLog("胸骨圧迫中断が10秒超。減点。");}
  else{c.score+=4;cprLog("10秒未満で次サイクルへ移行。圧迫者交代。");}
  c.cycle+=1; c.cycleSec=0; c.status="bls_active"; c.q.handsOff=0; c.q.fatigue=0;
  if(c.q.depth==="too_shallow"&&c.q.techniqueOK)c.q.depth="adequate";
  renderCPR(); }
const ROSC_THRESHOLD=20;
function cprReArrest(){ const c=S.cpr; const cause=c.m.cause, addressed=c.flags.has("cause_addressed");
  const base={hyperkalemia:35,iatrogenic_hyperkalemia:35,oxygenation_failure:35,shock_lactic_acidosis:30,obstructive_shock:40,drug_induced:20,sedation_related_cpa:20,anesthesia_related_cpa:20,hypoglycemia:25}[cause]||10;
  const risk = addressed? Math.max(5,base-30) : base;
  return {risk, label:(risk>=30?"高リスク":risk>=15?"中等度":"低い"), addressed, unresolved:REVERSIBLE_CAUSES.includes(cause)&&!addressed, cause}; }
// ROSC＝アウトカム判定。CPR品質・リズム制御・客観的循環回復で成立し得る（原因治療は“絶対条件”ではなく修飾因子）
function cprROSC(){ const c=S.cpr; if(!inPause()){cprLog("ROSC判定はpauseで（脈・血圧・ETCO₂を確認）。");return;}
  c.q.handsOff+=3; const e=c.mon.etco2v||0;
  const quality = c.q.compStarted && c.q.ventStarted && c.mon.etco2 && e>=18;     // ETCO₂≥18=CPR品質の指標
  const rhythmOk = c.rhythm==="organized_with_pulse" || (!isShock(c.trueRhythm) && c.roscProb>=ROSC_THRESHOLD);
  const objective = c.rhythm==="organized_with_pulse" || e>=30 || (!isShock(c.trueRhythm) && c.roscProb>=ROSC_THRESHOLD); // 客観的循環回復の根拠
  if(quality && rhythmOk && objective){ c.status="rosc";c.rhythm="rosc";
    cprLog("ROSC確認。ETCO₂上昇＋組織化リズム/客観的循環回復を確認。CPRを終了しPCA管理へ。"); cprDebrief(true); }
  else{ c.score-=3;
    const why = !quality?"CPR品質不足：胸骨圧迫・換気・ETCO₂≥18を見直す。"
      : isShock(c.trueRhythm)?"VF/PVTが組織化リズムへ移行していない。除細動を継続。"
      : `非ショックリズムでROSC根拠が不足（${Math.round(c.roscProb)}/${ROSC_THRESHOLD}）。圧迫の質・血管収縮薬・原因治療で上げる。`;
    cprLog("ROSCの客観的根拠が不十分："+why); renderCPR(); } }
function cprTerminate(){ const c=S.cpr; c.status="terminated"; cprLog("蘇生を中止した。"); cprDebrief(false); }

// --- スコア・デブリーフ ---
function scoreCPR(){ const c=S.cpr; let s=0; const cm=[];
  const add=(cond,p,okmsg,ngmsg)=>{ if(cond){s+=p;if(okmsg)cm.push(["ok",okmsg]);} else {if(ngmsg)cm.push(["bad",ngmsg]);} };
  add(c.q.compStarted,25,"胸骨圧迫を開始できた。","胸骨圧迫が開始されていない。"); if(!c.q.compStarted)s-=30;
  add(c.q.rate>=100&&c.q.rate<=120,8,"圧迫レート100–120/分。","圧迫レートが推奨範囲外。");
  add(c.q.depth==="adequate",8,"圧迫深度が適切。","圧迫深度が不適切。");
  add(c.q.recoil,6,"完全な胸郭リコイル。","胸郭リコイルが不十分。");
  add(c.q.techniqueOK,8,"胸郭形態に合った圧迫位置。","圧迫位置が不適切/未選択。");
  add(c.q.ventStarted,8,"換気を確立。","換気が確立されていない。");
  if(c.q.overVent){s-=10;cm.push(["bad","過換気。冠灌流を低下させうる。"]);}
  add(c.mon.ecg,8,"ECGモニタリング。","ECGモニタリング不足。");
  add(c.mon.etco2,8,"ETCO₂モニタリング。","ETCO₂モニタリング不足。");
  if(c.mon.etco2)add((c.mon.etco2v||0)>=18,10,"ETCO₂≥18 mmHg達成。CPR品質良好。","ETCO₂が低い。圧迫位置・深度・リコイル・換気を見直す。");
  add(c.access!=="none",8,"血管路を確保。","血管路が未確保。");
  add(c.rhythm!=="unknown",6,"リズムを判定。","リズム判定をしていない。");
  if(c.mon.lytes&&c.m.cause==="hyperkalemia")cm.push(["ok","CPA中に電解質を評価し可逆的原因を検索。"]);
  if(c.drugs.some(d=>d.id==="epi_high")){s-=30;cm.push(["bad","高用量エピを使用。RECOVER 2024では非推奨。"]);}
  if(c.drugs.filter(d=>d.id==="atropine").length>1){s-=20;cm.push(["bad","アトロピンを反復投与した。"]);}
  if(c.defibs.length>0&&!isShock(c.trueRhythm)){s-=15;cm.push(["bad","非ショック適応リズムに除細動した。"]);}
  if(isShock(c.trueRhythm)&&c.defibs.length===0&&c.q.compStarted){s-=10;cm.push(["bad","ショック適応リズムに除細動していない。"]);}
  if(REVERSIBLE_CAUSES.includes(c.m.cause)){ if(c.flags.has("cause_addressed")){s+=10;cm.push(["ok","可逆的原因（"+causeLabel(c.m.cause)+"）への治療を実施した。"]);} else cm.push(["warn","可逆的原因（"+causeLabel(c.m.cause)+"）が未治療。ROSC後の再CPAリスクが高い。"]); }
  // ※ ROSC達成（アウトカム）はProcess Gradeには含めず、別表示する
  s=Math.max(0,s);
  const g= s>=92?"S":s>=74?"A":s>=52?"B":s>=30?"C":"D";
  return {grade:g,score:s,comments:cm};
}
function cprDebrief(rosc){ if(cprRaf){cancelAnimationFrame(cprRaf);cprRaf=null;}
  const r=scoreCPR(); const pct=Math.max(0,Math.min(150,r.score));
  const gcol=(r.grade==="S"||r.grade==="A")?"var(--green)":r.grade==="B"?"var(--amber)":"var(--red)";
  const oks=r.comments.filter(c=>c[0]==="ok").map(c=>c[1]);
  const fails=r.comments.filter(c=>c[0]==="bad").map(c=>c[1]);
  const sym=t=>t==="ok"?"○":t==="warn"?"△":"×";
  let rows=r.comments.map(c=>`<div class="e"><span class="rchip ${c[0]}">${sym(c[0])}</span>${c[1]}</div>`).join('');
  const ra=cprReArrest();
  const racol=ra.risk>=30?'var(--red)':ra.risk>=15?'var(--amber)':'var(--green)';
  const pcaCard = rosc?`<div class="card" style="border-color:${ra.risk>=30?'#6b2330':ra.risk>=15?'#6b561d':'#1d6b50'}"><div class="sub">🫀 蘇生後（PCA）安定性</div><div class="log">
    <div class="e">再CPAリスク：<b style="color:${racol}">${ra.label}</b></div>
    ${ra.unresolved?`<div class="e"><span class="rchip bad">!</span>未対処の原因：<b>${causeLabel(ra.cause)}</b>（治療しないと再停止しやすい）</div>`:`<div class="e"><span class="rchip ok">○</span>可逆的原因に対処済み。ROSC後の安定性は良好。</div>`}
    <div class="e tiny">PCAで評価：酸素化・換気・血圧・ECG・ETCO₂・血糖・電解質・乳酸・体温・原因治療・神経状態</div></div></div>`:'';
  let drugs=S.cpr.drugs.length?S.cpr.drugs.map(d=>`${CPR_DRUGS.find(x=>x.id===d.id).label}（${fmt(d.t)}/サイクル${d.cycle+1}/${d.route.toUpperCase()}）`).join('<br>'):"なし";
  let defs=S.cpr.defibs.length?S.cpr.defibs.map(d=>`${d.j}J/kg ${d.wave==="biphasic"?"二相性":"単相性"} ${d.ok?"→組織化":"→持続"}`).join('<br>'):"なし";
  const failCard = (!rosc&&fails.length)?`<div class="card" style="border-color:#6b2330"><div class="sub" style="color:var(--red)">❗ ROSCに至らなかった主な要因</div><div class="log">${fails.map(f=>`<div class="e"><span class="rchip bad">×</span>${f}</div>`).join('')}</div></div>`:'';
  document.getElementById('cpr').innerHTML=`<div class="pad" style="overflow:auto;height:100%">
    <div style="text-align:center;margin:6px 0 10px"><div class="pill">CPR/ALS デブリーフ（RECOVER 2024）</div>
      <div class="scoreBig" style="color:${gcol}">${r.grade}</div>
      <div class="sub" style="margin-top:-2px">CPR Process Grade（手技の質）　${r.score}点</div>
      <div class="sub" style="margin-top:6px;font-weight:700">Outcome：${rosc?'<span style="color:var(--green)">🟢 ROSC 達成</span>':'<span style="color:var(--red)">🔴 ROSC 未達</span>'}</div>
      <div class="tiny" style="margin-top:3px">${S.cpr.cycle+1}サイクル・${fmt(S.cpr.totalSec)}　/　CPA原因：${causeLabel(S.cpr.m.cause)}${S.cpr.m.iatrogenic?'（医原性・回避可能だった可能性）':S.cpr.m.preventable!==false?'（予防可能な進行）':''}</div></div>
    ${failCard}
    ${pcaCard}
    <div class="card"><div class="sub">手技の評価（RECOVER 2024 とのズレ）</div><div class="log">${rows}</div></div>
    <div class="card"><div class="sub">記録</div><div class="tiny" style="line-height:1.7">投与薬剤：<br>${drugs}<br><br>除細動：<br>${defs}</div></div>
    ${S.cid==='practice'
    ? `<button class="btn primary" onclick="openCPRPractice()">▶ もう一度 練習する</button>
       <button class="btn ghost" style="margin-top:8px" onclick="toStart()">トップへ</button>`
    : rosc?`<button class="btn primary" onclick="cprReturnToCare()">▶ 蘇生後（PCA）管理として診療を続ける</button>
      <button class="btn ghost" style="margin-top:8px" onclick="finalize()">症例の最終評価へ</button>`
    :`<button class="btn primary" onclick="finalize()">症例の最終評価へ</button>
      <button class="btn ghost" style="margin-top:8px" onclick="enterCPR()">CPRをやり直す</button>`}
    <p class="tiny" style="margin-top:10px">※教育用シミュレーション。胸骨圧迫の手技・用量・除細動エネルギー・薬剤選択は最新のRECOVERガイドラインと施設プロトコルで確認してください。</p>
  </div>`;
}
function cprReturnToCare(){ // ROSC後、通常診療へ復帰（蘇生後管理）
  const ra=cprReArrest();
  S.arrest=false; S.rosc=true; S.cpr.status="rosc";
  // 原因未対処なら不安定な蘇生後状態（再CPAリスク）として戻す
  S.h.HR=ra.unresolved?96:120; S.h.SBP=ra.unresolved?78:95; S.h.SpO2=94; S.h.RR=ra.unresolved?34:24;
  document.getElementById('cpr').classList.add('hide');
  document.getElementById('sim').classList.remove('hide');
  document.getElementById('alarm').textContent=ra.unresolved?'🟠 ROSC（不安定）':'🟢 ROSC';
  log(ra.unresolved?("ROSC後、PCA管理を開始。可逆的原因（"+causeLabel(ra.cause)+"）が未対処で再CPAリスク高い。原因治療を。"):"ROSC後、蘇生後（PCA）管理として診療を再開。");
  if(timer)clearInterval(timer); timer=setInterval(tick,1000);
  render();
}

// --- CPR画面の描画 ---
function btnG(html){ return `<div class="card"><div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">${html}</div></div>`; }
function cb(onclick,label,on){ return `<button class="btn ${on?'':'ghost'}" style="padding:10px 6px;font-size:13px;${on?'border-color:#1d6b50':''}" onclick="${onclick}">${on?'✓ ':''}${label}</button>`; }
function renderCPR(){
  const c=S.cpr; const pause=inPause();
  const rh = c.rhythm==="unknown"?"— 判定前 —":rhythmName(c.rhythm);
  const et = c.mon.etco2? (c.mon.etco2v||"–")+" mmHg"+((c.mon.etco2v>=18)?" ✅":"") : "未装着";
  const statusTxt = c.status==="cpa_suspected"?"CPA疑い：初期評価を":c.status==="bls_active"?`BLS実施中（サイクル${c.cycle+1}）`:c.status==="cycle_pause"?"⏸ PAUSE（10秒以内に判定・処置・交代）":c.status;
  document.getElementById('cpr').innerHTML=`<div style="display:flex;flex-direction:column;height:100%;overflow:hidden">
    <div class="monitor">
      <div class="topbar"><span>🔴 CPR/ALS・RECOVER2024　経過 ${fmt(c.totalSec)}</span><span>${c.m.species==="cat"?"🐱":"🐕"} ${c.m.weightKg}kg</span></div>
      <div style="display:flex;gap:8px;margin-top:6px">
        <div class="vit" style="flex:1"><div class="lab">リズム</div><div style="font-weight:800;font-size:15px;color:${isShock(c.rhythm)?'#ff6d7a':'#7ef0c4'}">${rh}</div></div>
        <div class="vit" style="flex:1"><div class="lab">ETCO₂</div><div style="font-weight:800;font-size:15px;color:#5fd0ff">${et}</div></div>
        <div class="vit" style="flex:1"><div class="lab">経路 / ECG</div><div style="font-weight:800;font-size:13px">${c.access==="none"?"未確保":c.access.toUpperCase()} / ${c.mon.ecg?"装着":"なし"}</div></div>
      </div>
      <canvas id="cprecg" width="600" height="104" style="height:84px;margin-top:6px;background:#03100a;border:1px solid #10341f;border-radius:8px"></canvas>
    </div>
    <div class="body" style="flex:1;overflow:auto">
      <div class="card" style="text-align:center;border-color:${pause?'#6b561d':'#6b2330'}"><b style="color:${pause?'var(--amber)':'var(--red)'}">${statusTxt}</b>
        <div class="tiny" style="margin-top:2px">${c.flags.has('cause')?('推定原因：'+causeLabel(c.m.cause)+(c.m.iatrogenic?'（医原性）':'')+(REVERSIBLE_CAUSES.includes(c.m.cause)?'・可逆的→原因治療を':'')):'推定原因：未検索（「原因検索」で評価）'}</div>
        <div class="tiny" style="margin-top:2px">中断 ${Math.round(c.q.handsOff)}秒　/　圧迫 ${c.q.compStarted?(c.q.rate+"/分・"+(c.q.depth==="adequate"?"適深":"浅い")+(c.q.recoil?"・リコイル可":"")):"未開始"}　/　換気 ${c.q.ventStarted?(c.q.intubated?(c.q.ventRate+"回/分(挿管)"):"BMV"):"なし"}</div></div>

      <div class="sub" style="margin:4px 2px">① 初期評価</div>
      ${btnG(cb("cprCall('help','応援要請。記録係・タイマーを割り当てる。')","応援要請",c.flags.has('help'))+cb("cprCall('resp','反応・脈・呼吸を10秒以内で確認。CPA確定。')","反応/呼吸確認",c.flags.has('resp'))+cb("cprStartBLS()","BLS開始",c.status!=='cpa_suspected')+cb("cprCall('cause','可逆的原因(Hs&Ts)を検索。')","原因検索",c.flags.has('cause')))}

      <div class="sub" style="margin:4px 2px">② BLS（胸骨圧迫・換気）</div>
      ${btnG(cb("cprCompress()","胸骨圧迫 開始",c.q.compStarted)+cb("cprTechModal()","圧迫位置",c.q.techniqueOK)+cb("cprIntubate()","気管挿管",c.q.intubated)+cb("cprBagMask()","バッグマスク換気",c.q.ventStarted&&!c.q.intubated)+cb("cprVentModal()","換気回数",false)+cb("cprCall('o2','酸素100%を接続。')","酸素100%",c.flags.has('o2')))}

      <div class="sub" style="margin:4px 2px">③ ALS（pauseで判定・除細動・薬剤）</div>
      ${btnG(cb("cprAttachECG()","ECG装着",c.mon.ecg)+cb("cprAttachEtco2()","ETCO₂装着",c.mon.etco2)+cb("cprIV()","IV確保",c.access==='iv')+cb("cprIO()","IO確保",c.access==='io')+cb("cprAssess()","リズム判定",c.rhythm!=='unknown')+cb("cprDefibModal()","除細動",false)+cb("cprDrugModal()","薬剤投与",false)+cb("cprLytes()","K/Ca確認",c.mon.lytes))}

      ${!c.flags.has('cause')&&causeTreatments(c.m.cause).length?`<div class="sub" style="margin:4px 2px">⑤ 可逆的原因の治療</div><div class="card"><div class="tiny" style="text-align:center">「原因検索」を実施すると、可逆的原因への治療が表示されます。</div></div>`:''}
      ${c.flags.has('cause')&&causeTreatments(c.m.cause).length?`<div class="sub" style="margin:4px 2px">⑤ 可逆的原因の治療（${causeLabel(c.m.cause)}）</div>`
        +btnG(causeTreatments(c.m.cause).map(t=>cb("cprCauseRx('"+t[0]+"')",t[1],c.flags.has("ct_"+t[0]))).join('')+(causeTreatments(c.m.cause).length%2?'<div></div>':'')):''}

      <div class="sub" style="margin:4px 2px">⑥ サイクル / 判定</div>
      ${btnG(
        (pause? cb("cprNext()","▶ 次サイクル開始",false)+cb("cprROSC()","ROSC判定（脈確認）",false)
              : cb("cprRunCycle()","▶ 2分間CPRを実施",false)+cb("cprROSC()","ROSC判定",false))
        + cb("cprTerminate()","蘇生中止",false)+`<div></div>`)}

      <div class="card"><div class="sub" style="margin-bottom:4px">📋 経過</div><div class="log">${c.log.slice().reverse().map(e=>`<div class="e"><span class="ts">${fmt(e.t)}</span>${e.m}</div>`).join('')}</div></div>
      <p class="tiny" style="margin:0 2px 14px">※教育用。胸骨圧迫の手技・用量・除細動エネルギー・薬剤は最新のRECOVERガイドライン／施設プロトコルで確認してください。投与量計算は学習用です。</p>
    </div>
  </div>`;
}
function cprLoop(){ const cv=document.getElementById('cprecg'); if(!cv||!S.cpr){cprRaf=requestAnimationFrame(cprLoop);return;}
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height,LH=H/2;
  ctx.fillStyle="#03100a";ctx.fillRect(0,0,W,H);
  ctx.strokeStyle="#0c2a1a";ctx.lineWidth=1;
  for(let x=0;x<W;x+=18){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  ctx.beginPath();ctx.moveTo(0,LH);ctx.lineTo(W,LH);ctx.stroke(); // 2レーン分割線
  const c=S.cpr;
  if(!c._b){c._b=new Array(W).fill(LH*0.5);c._cap=new Array(W).fill(LH*1.92);c._x=0;c._ph=0;c._cp=0;}
  const compressing = c.q.compStarted && c.status==="bls_active"; // 圧迫実施中か
  const rhythmShown = c.rhythm!=="unknown";
  const ec = c.mon.etco2 ? (c.mon.etco2v||8) : 0;
  const bw = Math.max(40,Math.round(W/6)); // 換気1呼吸の幅
  for(let s=0;s<4;s++){ c._x=(c._x+1)%W;
    // ECGレーン（上半分・中心 LH*0.5）
    let y=LH*0.5;
    if(c.status==="rosc"||c.rhythm==="organized_with_pulse"||c.rhythm==="rosc"){ c._ph+=1/40;if(c._ph>=1)c._ph-=1; y=LH*0.5-ecgSample(c._ph)*LH*0.42; }
    else if(compressing){ c._cp+=0.17; y=LH*0.5 - Math.max(0,Math.sin(c._cp))*LH*0.46 - (Math.random()-0.5)*2; } // 圧迫アーチファクト（常に動く）
    else if(rhythmShown&&c.rhythm==="vf"){ y=LH*0.5+(Math.sin(c._x*0.7)+Math.sin(c._x*1.9))*LH*0.2+(Math.random()-0.5)*4; }
    else if(rhythmShown&&c.rhythm==="pea"){ c._ph+=1/55;if(c._ph>=1)c._ph-=1; y=LH*0.5-ecgSample(c._ph)*LH*0.3; }
    else { y=LH*0.5+(Math.random()-0.5)*2; } // asystole / 判定前は平坦
    c._b[c._x]=y; for(let k=1;k<5;k++)c._b[(c._x+k)%W]=null;
    // ETCO₂カプノグラフ（下半分・ベースライン LH*1.92）
    let cy=LH*1.92;
    if(c.mon.etco2 && (compressing||c.q.ventStarted)){
      const amp=(Math.min(45,Math.max(4,ec))/45)*LH*0.78;
      const ph=(c._x%bw)/bw;
      const plat = ph<0.18? ph/0.18 : ph>0.82? Math.max(0,(1-(ph-0.82)/0.18)) : 1;
      cy = LH*1.92 - amp*plat;
    }
    c._cap[c._x]=cy; for(let k=1;k<5;k++)c._cap[(c._x+k)%W]=null;
  }
  ctx.strokeStyle=compressing?"#37e08a":"#2aa86a";ctx.lineWidth=2;ctx.beginPath();let st=false;
  for(let x=0;x<W;x++){const y=c._b[(c._x+1+x)%W];if(y==null){st=false;continue;}if(!st){ctx.moveTo(x,y);st=true;}else ctx.lineTo(x,y);} ctx.stroke();
  ctx.strokeStyle="#5fd0ff";ctx.lineWidth=2;ctx.beginPath();st=false;
  for(let x=0;x<W;x++){const y=c._cap[(c._x+1+x)%W];if(y==null){st=false;continue;}if(!st){ctx.moveTo(x,y);st=true;}else ctx.lineTo(x,y);} ctx.stroke();
  ctx.fillStyle=compressing?"#37e08a":"#2a6b4a";ctx.font="10px ui-monospace";ctx.fillText("ECG"+(compressing?"  ● 圧迫中":"  （圧迫停止中）"),5,12);
  ctx.fillStyle="#3f9ec4";ctx.fillText("ETCO₂"+(c.mon.etco2?("  "+Math.round(ec)+" mmHg"):"  未装着"),5,LH+13);
  cprRaf=requestAnimationFrame(cprLoop);
}

listCases();
</script>
